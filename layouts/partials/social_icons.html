<div class="social-icons" {{ with .align}}align="{{.}}" {{- end }}>
    {{- range site.Params.socialIcons }}
    <a href="{{ trim .url " " | safeURL }}" target="_blank" rel="noopener noreferrer me"
        title="{{ (.title | default .name) | title }}">
        {{- if eq (.name | lower) "huggingface" }}
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" height="20" width="20">
            <line x1="3"  y1="5" x2="3"  y2="19"/>
            <line x1="9"  y1="5" x2="9"  y2="19"/>
            <line x1="3"  y1="12" x2="9" y2="12"/>
            <line x1="13" y1="5" x2="13" y2="19"/>
            <line x1="13" y1="5" x2="21" y2="5"/>
            <line x1="13" y1="12" x2="19" y2="12"/>
        </svg>
        {{- else }}
        {{ partial "svg.html" . }}
        {{- end }}
    </a>
    {{- end }}
</div>
